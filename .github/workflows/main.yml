name: Vulnerability Scan and Testbench

on:
  pull_request:
  push:

jobs:
  vulnerability_scan:
    name: Vulnerability Scan
    if: ${{ github.ref_type != 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - name: Scan source for Vulnerabilities (govulncheck)
        uses: golang/govulncheck-action@v1
        with:
          go-package: -mode=source -show verbose ./
          repo-checkout: true
          # we need to set a version here until https://github.com/golang/go/issues/70036 is fixed..
          go-version-input: ""
          go-version-file: go.mod
  run_tests:
    name: Testbench (${{ matrix.arch }})
    if: ${{ github.ref_type != 'tag' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Run linter checks
        run: make lint
      - name: Build shared object
        run: make build
      - name: Run FTW tests
        run: make ftw
      - name: Run e2e tests
        run: make e2e
