name: Create Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Build shared object
        run: make build
      - name: Run FTW tests
        run: make ftw
      - name: Run e2e tests
        run: make e2e
      - name: Generate Release Notes
        id: notes
        if: ${{ !contains(github.ref_name, '-') }}
        uses: theory/changelog-version-notes-action@v0.1.3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/envoy-coraza
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Build and push performance Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: envoy-coraza
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/envoy-coraza:${{ github.ref_name }}-perf
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TAGS=coraza.rule.multiphase_evaluation,libinjection_cgo,re2_cgo
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: envoy-coraza
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/envoy-coraza:${{ github.ref_name }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Deploy Release Candidate
        uses: softprops/action-gh-release@v3
        if: ${{ contains(github.ref_name, '-rc') }}
        with:
          body_path: '${{ steps.notes.outputs.file }}'
          generate_release_notes: false
          prerelease: true
          files: |
            CHANGELOG.md
            LICENSE
            build/coraza-waf.so
      - name: Deploy Final Release
        uses: softprops/action-gh-release@v3
        if: ${{ !contains(github.ref_name, '-') }}
        with:
          body_path: '${{ steps.notes.outputs.file }}'
          generate_release_notes: false
          prerelease: false
          files: |
            CHANGELOG.md
            LICENSE
            build/coraza-waf.so
      - name: Pre-release
        uses: softprops/action-gh-release@v3
        if: ${{ contains(github.ref_name, '-') }}
        with:
          generate_release_notes: true
          prerelease: true
          files: |
            CHANGELOG.md
            LICENSE
            build/coraza-waf.so
