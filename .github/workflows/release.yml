name: Create Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/envoy-coraza

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Build shared object
        run: make build
      - name: Run FTW tests
        run: make ftw
      - name: Run e2e tests
        run: make e2e

  build:
    name: Build (${{ matrix.variant }}/${{ matrix.arch }})
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [standard, performance]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: envoy-coraza
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TAGS=${{ matrix.variant == 'performance' && 'coraza.rule.multiphase_evaluation,libinjection_cgo,re2_cgo' || 'coraza.rule.multiphase_evaluation' }}
          outputs: |
            type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
            type=local,dest=${{ runner.temp }}/rootfs
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1
      - name: Stage shared object
        run: |
          suffix=${{ matrix.variant == 'performance' && '-perf' || '' }}
          mkdir -p "${{ runner.temp }}/so"
          cp "${{ runner.temp }}/rootfs/etc/envoy/coraza-waf.so" \
            "${{ runner.temp }}/so/coraza-waf${suffix}-${{ matrix.arch }}.so"
      - name: Upload shared object
        uses: actions/upload-artifact@v7
        with:
          name: coraza-waf-so-${{ matrix.variant }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/so/*.so
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest (${{ matrix.variant }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [standard, performance]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
            suffix=${{ matrix.variant == 'performance' && '-perf' || '' }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)
      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}

  release:
    name: Deploy Release
    needs: merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
      - name: Download shared objects
        uses: actions/download-artifact@v8
        with:
          path: build
          pattern: coraza-waf-so-*
          merge-multiple: true
      - name: Generate Release Notes
        id: notes
        if: ${{ !contains(github.ref_name, '-') }}
        uses: theory/changelog-version-notes-action@v0.1.3
      - name: Deploy Release Candidate
        uses: softprops/action-gh-release@v3
        if: ${{ contains(github.ref_name, '-') }}
        with:
          generate_release_notes: true
          prerelease: true
          files: |
            CHANGELOG.md
            LICENSE
            build/*.so
      - name: Deploy Final Release
        uses: softprops/action-gh-release@v3
        if: ${{ !contains(github.ref_name, '-') }}
        with:
          body_path: '${{ steps.notes.outputs.file }}'
          generate_release_notes: false
          prerelease: false
          files: |
            CHANGELOG.md
            LICENSE
            build/*.so
