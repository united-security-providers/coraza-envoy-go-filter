---
services:
  httpbin:
    image: mccutchen/go-httpbin:2.22.1
  sse-server:
    build:
      context: ./sse-server
  chown:
    image: alpine:3.23
    command:
      - /bin/sh
      - -c
      - chown -R 101:101 /etc/envoy/logs
    volumes:
      - ./logs:/etc/envoy/logs:rw
  envoy:
    depends_on:
      - chown
      - httpbin
      - sse-server
    image: coraza-waf-envoy
    command:
      - -c
      - /etc/envoy/envoy.yaml
      - --log-format [%Y-%m-%d %T.%f][%t][%l][%n] [%g:%#] %v
      - --log-path
      - /etc/envoy/logs/envoy.log
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
      - ./my_custom_setup.conf:/etc/envoy/my_custom_setup.conf
      - ./my_custom_rules:/etc/envoy/my_custom_rules
      - ../../build/coraza-waf.so:/etc/envoy/coraza-waf.so
      - ./logs:/etc/envoy/logs:rw
    ports:
      - 8081:8081
      - 9999:9999
    environment:
      - GODEBUG=cgocheck=0
  tests:
    depends_on:
      - envoy
      - sse-server
    build:
      context: .
    env_file:
      - ./.env.e2e
